<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L20 Control</title>
        <link rel="stylesheet" href="style.css">
        <script src="app.js" defer></script>
        <script src="controls.js"></script>
        <script src="midi.js"></script>
    </head>
    <body>
        <h1>L20 Control</h1>
        <label for="show_settings">Show Settings</label>
        <input type="checkbox" id="show_settings">
        <div id="settings_ui">
            <div id="network_ui" style="margin-bottom:12px;">
                <h3>Network</h3>
                Status: <span id="status_ws">disconnected</span><br/>
                <label for="ws_url">WebSocket server:</label>
                <input id="ws_url" type="text" value="ws://127.0.0.1:8765" size="28">
                <label for="nick">Nick:</label>
                <input id="nick" type="text" value="" size="12" placeholder="name">
                <label for="color">Color:</label>
                <input id="color" type="color" value="#00aaff">
                <label for="role">Role:</label>
                <select id="role">
                    <option value="client">Client</option>
                    <option value="host">Host</option>
                </select>
                <button id="join_ws">Join Network</button>
            </div>
            <div id="ble_ui" style="margin-bottom:12px;">
                <h3>Bluetooth</h3>
                BLE Device: <span id="status_ble">disconnected</span>
                <button id="connect">Connect</button>
                <button id="disconnect">Disconnect</button><br/>
            </div>
            <div id="log_ui">
                <h3>Log</h3>
                <textarea id="log" rows="10" cols="50" readonly></textarea><br/>
            </div>
        </div>
        
        <div id="peers"></div>
        <main>
            
            <div id="bus_controls">
                <h2>Bus Faders</h2>
                <div id="bus_faders"></div>
            </div>
            <div id="master_controls">
                <h2>Master Faders</h2>
                <div id="master_faders"></div>
            </div>
            <div id="monitor_a_controls">
                <h2>Monitor A Faders</h2>
                <div id="monitor_a_faders"></div>
            </div>
            <div id="monitor_b_controls">
                <h2>Monitor B Faders</h2>
                <div id="monitor_b_faders"></div>
            </div>
            <div id="monitor_c_controls">
                <h2>Monitor C Faders</h2>
                <div id="monitor_c_faders"></div>
            </div>
            <div id="monitor_d_controls">
                <h2>Monitor D Faders</h2>
                <div id="monitor_d_faders"></div>
            </div>
            <div id="monitor_e_controls">
                <h2>Monitor E Faders</h2>
                <div id="monitor_e_faders"></div>
            </div>
            <div id="monitor_f_controls">
                <h2>Monitor F Faders</h2>
                <div id="monitor_f_faders"></div>
            </div>
        </main>
    </body>
</html>
