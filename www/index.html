<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L20 Control</title>
        <link rel="stylesheet" href="style.css">
        <script src="app.js" defer></script>
        <script src="controls.js"></script>
        <script src="midi.js"></script>
    </head>
    <body>
        <h1>L20 Control</h1>
        <div id="connectivity">
            <div id="ble_ui">
                <button id="ble_connect" ckass="status">ᚼᛒ Bluetooth</button>
            </div>
            |
            <div id="ws_ui">
                <button id="ws_connect" class="status">🌐 Websocket</button>
            </div>
            |
            <div id="share_ui">
                <button id="share_link">🔗 Share Link</button>
            </div>
            |
            <div id="user_ui">
                <input id="nick" type="text" value="" size="12" placeholder="name">
                <input id="color" type="color" value="#00aaff">
            </div>    
        </div>
        <label for="show_settings">Show Settings</label>
        <input type="checkbox" id="show_settings">
        <div id="settings_ui">
            <div id="room_ui">
                <label for="roomId">Room ID:</label>
                <input id="room_id" type="text" size="36" placeholder="Room ID">
            </div>
            <div id="log_ui">
                <h3>Log</h3>
                <textarea id="log" rows="10" cols="50" readonly></textarea><br/>
            </div>
            <div id="mixer_settings_ui">
                <h3>Mixer Settings</h3>
                <input type="checkbox" id="peaks_enabled">
                <label for="peaks_enabled">Enable Peaks</label>
                <button id="patch_request">Fetch Patch</button>
            </div>
        </div>
        
        <div id="peers"></div>
        <main>
            <progress id="initial-load"></progress>
        </main>
    </body>
</html>
