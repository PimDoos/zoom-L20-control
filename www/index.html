<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>L20 Control</title>
        <link rel="stylesheet" href="style.css">
        <script src="app.js" defer></script>
        <script src="controls.js"></script>
        <script src="midi.js"></script>
    </head>
    <body>
        <h1>L20 Control</h1>
        <main>
            <button id="connect">Connect</button>
            <button id="disconnect">Disconnect</button><br/>
            <textarea id="log" rows="10" cols="50" readonly></textarea><br/>
            <div id="bus_controls">
                <h2>Bus Faders</h2>
                <div id="bus_faders"></div>
            </div>
            <div id="master_controls">
                <h2>Master Faders</h2>
                <div id="master_faders"></div>
            </div>
            <div id="monitor_a_controls">
                <h2>Monitor A Faders</h2>
                <div id="monitor_a_faders"></div>
            </div>
            <div id="monitor_b_controls">
                <h2>Monitor B Faders</h2>
                <div id="monitor_b_faders"></div>
            </div>
            <div id="monitor_c_controls">
                <h2>Monitor C Faders</h2>
                <div id="monitor_c_faders"></div>
            </div>
            <div id="monitor_d_controls">
                <h2>Monitor D Faders</h2>
                <div id="monitor_d_faders"></div>
            </div>
            <div id="monitor_e_controls">
                <h2>Monitor E Faders</h2>
                <div id="monitor_e_faders"></div>
            </div>
            <div id="monitor_f_controls">
                <h2>Monitor F Faders</h2>
                <div id="monitor_f_faders"></div>
            </div>
        </main>
    </body>
</html>
